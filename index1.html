<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>66ai.ru — VibeCraft</title>
    <link rel="canonical" href="https://66ai.ru/" />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Serif для заголовков + Manrope для текста -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>

    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "surface": "#f5f0e6",
              "surface-dark": "#e8e2d9",
              "on-surface": "#191c1e",
              "on-surface-variant": "#43474e",
              "primary": "#006875",
              "primary-light": "#008a9a",
              "bronze": "#8b6a4f",
              "bronze-light": "#a37a5f",
              "card-bg": "#ffffff",
              "card-border": "#d4cfc6",
            },
            fontFamily: {
              "emboss": ["Cinzel", "Georgia", "serif"],
              "body": ["Manrope", "system-ui", "sans-serif"]
            }
          }
        }
      }
    </script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }

      body {
          background-color: #f5f0e6;
          color: #191c1e;
          font-family: 'Manrope', system-ui, sans-serif;
      }

      /* Bronze embossed text — адаптирован для светлого фона */
      .bronze-emboss {
          color: #8b6a4f;
          text-shadow:
              0 1px 0 rgba(163, 122, 95, 0.3),
              0 2px 0 rgba(130, 100, 75, 0.2),
              0 3px 3px rgba(80, 60, 40, 0.15),
              0 5px 8px rgba(60, 45, 30, 0.1);
          font-family: 'Cinzel', Georgia, serif;
          letter-spacing: 0.04em;
          font-weight: 700;
      }

      .bronze-emboss-sm {
          color: #8b6a4f;
          text-shadow:
              0 1px 0 rgba(163, 122, 95, 0.25),
              0 2px 0 rgba(130, 100, 75, 0.15),
              0 3px 3px rgba(80, 60, 40, 0.12),
              0 5px 8px rgba(60, 45, 30, 0.08);
          font-family: 'Cinzel', Georgia, serif;
          letter-spacing: 0.03em;
          font-weight: 600;
      }

      /* Large Gateway Cards */
      .gateway-card {
          background: linear-gradient(160deg, #ffffff 0%, #faf8f4 100%);
          border: 1px solid #d4cfc6;
          border-radius: 1.5rem;
          padding: 3rem 2.5rem;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          text-align: center;
          text-decoration: none;
          position: relative;
          overflow: hidden;
          transition: all 0.4s cubic-bezier(.22,.61,.36,1);
          box-shadow:
              0 1px 3px rgba(25,28,30,0.04),
              0 4px 12px rgba(25,28,30,0.06),
              0 16px 40px rgba(25,28,30,0.04);
      }
      .gateway-card::before {
          content: '';
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          height: 40%;
          background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, transparent 100%);
          pointer-events: none;
      }
      .gateway-card:hover {
          border-color: rgba(0, 104, 117, 0.3);
          box-shadow:
              0 2px 6px rgba(25,28,30,0.05),
              0 8px 24px rgba(25,28,30,0.08),
              0 24px 48px rgba(25,28,30,0.05),
              0 0 0 1px rgba(0, 104, 117, 0.1);
          transform: translateY(-3px);
      }

      /* Card CTA arrow */
      .card-cta {
          margin-top: 2rem;
          display: inline-flex;
          align-items: center;
          gap: 0.5rem;
          color: #006875;
          font-family: 'Manrope', sans-serif;
          font-weight: 700;
          font-size: 0.75rem;
          letter-spacing: 0.15em;
          text-transform: uppercase;
          transition: gap 0.3s ease;
      }
      .gateway-card:hover .card-cta {
          gap: 0.75rem;
      }

      /* 3D Tilt */
      .tilt-wrapper {
          perspective: 1000px;
      }
      .tilt-card {
          transform-style: preserve-3d;
          transition: transform 0.35s cubic-bezier(.22,.61,.36,1);
          will-change: transform;
      }
      .tilt-content {
          transform: translateZ(15px);
      }

      /* Entrance animations */
      @keyframes title-fade-in {
          0%   { opacity: 0; transform: translateY(-15px) scale(0.97); }
          100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes divider-fade-in {
          0%   { opacity: 0; width: 0; }
          100% { opacity: 1; width: 50px; }
      }
      @keyframes cards-fade-up {
          0%   { opacity: 0; transform: translateY(30px); }
          100% { opacity: 1; transform: translateY(0); }
      }
      .anim-title {
          animation: title-fade-in 0.7s cubic-bezier(.22,.61,.36,1) forwards;
          opacity: 0;
      }
      .anim-divider {
          animation: divider-fade-in 0.5s ease-out 0.4s forwards;
          opacity: 0;
          width: 0;
      }
      .anim-cards {
          animation: cards-fade-up 0.7s ease-out 0.7s forwards;
          opacity: 0;
      }

      /* Typewriter text */
      .typewriter-line {
          display: block;
          font-family: 'Manrope', sans-serif;
          font-size: 1.125rem;
          font-weight: 600;
          color: #191c1e;
          letter-spacing: 0.01em;
          min-height: 1.75rem;
      }
      .typewriter-cursor {
          display: inline-block;
          width: 2px;
          height: 1.2em;
          background-color: #006875;
          margin-left: 2px;
          vertical-align: text-bottom;
          animation: cursor-blink 0.8s step-end infinite;
      }
      @keyframes cursor-blink {
          0%, 100% { opacity: 1; }
          50%      { opacity: 0; }
      }

      /* Responsive adjustments */
      @media (max-width: 767px) {
          .gateway-card {
              padding: 2rem 1.5rem;
              min-height: 280px;
          }
      }
    </style>
</head>
<body class="font-body">

    <!-- Full-screen Gateway -->
    <div class="relative min-h-screen flex flex-col items-center justify-center px-4 py-12 overflow-hidden bg-[#f5f0e6]">

        <!-- Title: VibeCraft -->
        <h1 class="anim-title text-center mb-5">
            <span class="bronze-emboss text-4xl sm:text-5xl md:text-6xl lg:text-7xl tracking-wider">VibeCraft</span>
        </h1>

        <!-- Divider -->
        <div class="anim-divider h-px bg-gradient-to-r from-transparent via-primary/25 to-transparent mb-10 md:mb-14"></div>

        <!-- Two Large Equal Cards -->
        <div class="anim-cards relative z-10 grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8 max-w-5xl w-full">

            <!-- Card 1: Аттестация 66Ai -->
            <div class="tilt-wrapper" data-tilt>
                <a href="attestation.html" class="tilt-card gateway-card" style="min-height: 380px;">
                    <div class="tilt-content flex flex-col items-center justify-center h-full w-full">
                        <div class="bronze-emboss text-2xl sm:text-3xl md:text-[2rem] leading-tight whitespace-nowrap mb-5">Аттестация 66Ai</div>
                        <p class="text-on-surface-variant text-base md:text-lg leading-relaxed max-w-sm font-body font-light">
                            Аттестация покажет кто из сотрудников умеет пользоваться ИИ и сколько можно будет экономить на рутинной работе в месяц
                        </p>
                        <div class="card-cta">
                            Перейти
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                        </div>
                    </div>
                </a>
            </div>

            <!-- Card 2: Обучение Вайбкодингу -->
            <div class="tilt-wrapper" data-tilt>
                <a href="index.html" class="tilt-card gateway-card" style="min-height: 380px;">
                    <div class="tilt-content flex flex-col items-center justify-center h-full w-full">
                        <div class="bronze-emboss-sm text-xl sm:text-2xl md:text-[1.65rem] leading-tight mb-5">Обучение Вайбкодингу</div>
                        <p class="text-on-surface-variant text-base md:text-lg leading-relaxed max-w-sm font-body font-light">
                            Вы можете обучить своих сотрудников или себя созданию телеграмм ботов, ИИ-Агентов или кастомных CRM систем
                        </p>
                        <div class="card-cta">
                            Перейти
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <!-- Typewriter Text Under Cards -->
        <div class="mt-12 md:mt-16 text-center z-10 anim-cards" style="animation-delay: 1.1s;">
            <span id="typewriter-text" class="typewriter-line"></span><span id="typewriter-cursor" class="typewriter-cursor"></span>
        </div>

    </div>

    <!-- 3D Tilt JS (Vanilla) -->
    <script>
    (function() {
        var tiltWrappers = document.querySelectorAll('[data-tilt]');
        var MAX_TILT = 2.5;

        tiltWrappers.forEach(function(wrapper) {
            var card = wrapper.querySelector('.tilt-card');
            if (!card) return;

            wrapper.addEventListener('mousemove', function(e) {
                var rect = wrapper.getBoundingClientRect();
                var x = e.clientX - rect.left;
                var y = e.clientY - rect.top;
                var centerX = rect.width / 2;
                var centerY = rect.height / 2;

                var rotateY = ((x - centerX) / centerX) * MAX_TILT;
                var rotateX = ((centerY - y) / centerY) * MAX_TILT;

                card.style.transform = 'perspective(1000px) rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg)';
            });

            wrapper.addEventListener('mouseleave', function() {
                card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
            });
        });
    })();

    // Typewriter effect
    (function() {
        var lines = [
            'Хватит раздувать штат',
            'Обучите команду работе с ИИ'
        ];
        var el = document.getElementById('typewriter-text');
        var cursor = document.getElementById('typewriter-cursor');
        if (!el) return;

        var lineIndex = 0;
        var charIndex = 0;
        var isDeleting = false;
        var currentText = '';

        function type() {
            if (!isDeleting && lineIndex >= lines.length) {
                // All lines done — stop, keep final text
                cursor.style.animation = 'none';
                cursor.style.opacity = '0';
                return;
            }

            var fullText = lines[lineIndex];

            if (!isDeleting) {
                // Typing forward
                if (charIndex <= fullText.length) {
                    currentText = fullText.substring(0, charIndex);
                    el.textContent = currentText;
                    charIndex++;
                    setTimeout(type, 60 + Math.random() * 40);
                } else {
                    // Line complete — pause, then move to next or delete
                    if (lineIndex < lines.length - 1) {
                        setTimeout(function() {
                            lineIndex++;
                            charIndex = 0;
                            el.textContent = '';
                            type();
                        }, 1200);
                    } else {
                        // Last line — pause and done
                        setTimeout(function() {
                            cursor.style.animation = 'none';
                            cursor.style.opacity = '0';
                        }, 1500);
                    }
                }
            }
        }

        // Start after entrance animations
        setTimeout(type, 1600);
    })();
    </script>
</body>
</html>
